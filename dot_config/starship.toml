"$schema" = 'https://starship.rs/config-schema.json'

# 保留换行，将信息展示与输入区隔离，降低认知负担
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
# 动态 Monorepo 路径：内部全展，外部截断
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = false

style = "#64B5F6"
before_repo_root_style = "#BDBDBD"
repo_root_style = "#64B5F6"

format = "[$read_only]($read_only_style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style) "
read_only = " 🔒"
read_only_style = "#CF6679"

[character]
# 映射到对应的语义 Token
# success -> accent (#A291B5 紫色)
# error -> danger (#CF6679 红色)
# vimcmd -> success (#81C784 绿色)
success_symbol = "[❯](#A291B5)"
error_symbol = "[❯](#CF6679)"
vimcmd_symbol = "[❮](#81C784)"

[git_branch]
format = "[$branch]($style)"
# 用户明确要求：分支名是关键信息，常驻显示
# 映射到 tokens.intent.accent (辅助强调色：薰衣草紫)
style = "#A291B5"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](#D4A373) ($ahead_behind$stashed)]($style)"
# 整体括号使用 structure (#76C1E1)，内部的修改状态使用新增的 warning (#D4A373)
style = "#76C1E1"
conflicted = "!"
untracked = "?"
modified = "*"
staged = "+"
renamed = "»"
deleted = "✘"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
# 映射到 tokens.text.faint (退后文本)
style = "#454545"

[cmd_duration]
format = "[$duration]($style) "
# 映射到新增的 tokens.intent.warning (警告色：琥珀色/麦色)
style = "#D4A373"

[python]
format = "[$virtualenv]($style) "
# 映射到 tokens.text.faint (退后文本)
style = "#454545"
detect_extensions = []
detect_files = []
